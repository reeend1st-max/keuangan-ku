<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#0A0E17"/>
<meta name="description" content="Keuangan Ku — Personal Finance Tracker"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Keuangan Ku"/>
<title>Keuangan Ku 💰</title>
<link rel="manifest" href="/manifest.json"/>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"/>
<link rel="apple-touch-icon" href="/assets/icon-192.png"/>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div id="root"></div>
<div id="boot-error">
  <h2>⚠️ Gagal memuat</h2>
  <p style="color:#7A90B0;font-size:14px;margin-bottom:12px;">Periksa koneksi internet, lalu tekan F5. Jika masalah berlanjut, pastikan environment variables Supabase sudah diisi dengan benar di Vercel.</p>
  <pre id="boot-error-detail"></pre>
</div>

<!-- Vendored libraries — no external CDN dependency at runtime -->
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<script src="/vendor/supabase.js"></script>

<!-- Runtime config: SUPABASE_URL / SUPABASE_ANON_KEY, generated at build
     time from environment variables by scripts/generate-config.js -->
<script src="/config.js"></script>

<script>
window.addEventListener("error",function(e){
  var b=document.getElementById("boot-error"),d=document.getElementById("boot-error-detail");
  if(b&&!b.classList.contains("show")){d.textContent=(e.error&&e.error.stack)?e.error.stack:e.message;b.classList.add("show");}
});
</script>

<!-- Supabase-backed data layer -->
<script src="/js/api.js"></script>
<!-- Main application -->
<script src="/js/app.js"></script>

<script>
try{
  if(!window.React||!window.ReactDOM)throw new Error("React gagal dimuat.");
  if(!window.supabase)throw new Error("Supabase client gagal dimuat.");
  if(!window.Api)throw new Error("Modul Api (api.js) gagal dimuat.");
  ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
}catch(e){
  var b=document.getElementById("boot-error"),d=document.getElementById("boot-error-detail");
  d.textContent=e.stack||e.message;b.classList.add("show");
}
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js').catch(function(){});
  });
}
</script>
</body>
</html>
